<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroPump — Type d'usage</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: url('/static/images/irrigation.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 0;
            pointer-events: none;
        }
        .navbar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a472a;
            position: relative;
            z-index: 10;
        }
        .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 12px rgba(245,158,11,0.3);
        }
        .logo-text { font-size:19px; font-weight:800; color:white; letter-spacing:-0.3px; }
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            position: relative;
            z-index: 1;
        }
        .container { width:100%; max-width: 740px; }
        .page-header { text-align:center; margin-bottom:36px; }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }
        .page-sub {
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
            max-width: 520px;
            margin: 0 auto;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 32px;
        }
        .usage-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 24px 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            user-select: none;
        }
        .usage-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.22);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.3);
        }
        .usage-card.selected {
            background: rgba(245,158,11,0.08);
            border-color: #f59e0b;
            box-shadow: 0 0 20px rgba(245,158,11,0.15);
            transform: translateY(-4px);
        }
        .card-icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }
        .card-label {
            font-size: 14px;
            font-weight: 600;
            color: white;
            line-height: 1.35;
        }
        .autre-input { display:none; margin-top:14px; }
        .usage-card.selected .autre-input { display:block; }
        .autre-input input {
            width: 100%;
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            outline: none;
            text-align: left;
            transition: border-color 0.2s;
        }
        .autre-input input:focus { border-color: rgba(245,158,11,0.4); box-shadow: 0 0 0 3px rgba(245,158,11,0.08); }
        .autre-input input::placeholder { color: rgba(255,255,255,0.3); }
        .btn-wrap { display:flex; justify-content:center; }
        .btn-continuer {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
            border: none;
            padding: 13px 40px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s;
            opacity: 0.35;
            pointer-events: none;
        }
        .btn-continuer.active { opacity:1; pointer-events:all; }
        .btn-continuer.active:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245,158,11,0.35);
        }
        @media (max-width: 768px) {
            .navbar { height:56px; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
            .page-title { font-size:22px; }
        }
        @media (max-width: 480px) {
            .main { padding:24px 14px; align-items:flex-start; padding-top:32px; }
            .cards-grid { grid-template-columns: 1fr; gap:10px; }
            .page-title { font-size:20px; }
            .page-sub { font-size:13px; }
            .page-header { margin-bottom:24px; }
            .btn-continuer { width:100%; }
            .btn-wrap { display:block; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">
            <div class="logo-icon">
                <ph-drop-half weight="duotone" style="font-size:20px;color:#1a472a;"></ph-drop-half>
            </div>
            <span class="logo-text">HydroPump</span>
        </a>
    </nav>

    <div class="main">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Quel est votre type d'usage ?</h1>
                <p class="page-sub">Sélectionnez le type d'usage pour lequel vous souhaitez dimensionner votre système de pompage.</p>
            </div>

            <form method="POST" action="/usage" id="usageForm">
                <input type="hidden" name="type_usage" id="typeUsageInput">
                <input type="hidden" name="autre_usage" id="autreUsageInput">

                <div class="cards-grid">
                    <div class="usage-card" data-value="Irrigation agricole" onclick="selectCard(this)">
                        <div class="card-icon" style="background:rgba(34,197,94,0.15);">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"><path d="M12 22V11"/><path d="M5.45 5.11L2 12h6.5l-1 9 8.55-9.89L12 11h6l-6.55-5.89z"/></svg>
                        </div>
                        <div class="card-label">Irrigation agricole</div>
                    </div>
                    <div class="usage-card" data-value="Résidentiel" onclick="selectCard(this)">
                        <div class="card-icon" style="background:rgba(96,165,250,0.15);">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        </div>
                        <div class="card-label">Résidentiel</div>
                    </div>
                    <div class="usage-card" data-value="Village / Eau potable" onclick="selectCard(this)">
                        <div class="card-icon" style="background:rgba(251,191,36,0.15);">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        </div>
                        <div class="card-label">Village / Eau potable</div>
                    </div>
                    <div class="usage-card" data-value="Élevage" onclick="selectCard(this)">
                        <div class="card-icon" style="background:rgba(251,146,60,0.15);">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round"><ellipse cx="12" cy="8" rx="8" ry="4"/><path d="M4 8v8c0 2.2 3.6 4 8 4s8-1.8 8-4V8"/><path d="M4 12c0 2.2 3.6 4 8 4s8-1.8 8-4"/></svg>
                        </div>
                        <div class="card-label">Élevage</div>
                    </div>
                    <div class="usage-card" data-value="Industrie" onclick="selectCard(this)">
                        <div class="card-icon" style="background:rgba(167,139,250,0.15);">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                        </div>
                        <div class="card-label">Industrie</div>
                    </div>
                    <div class="usage-card" data-value="autre" onclick="selectCard(this)">
                        <div class="card-icon" style="background:rgba(255,255,255,0.08);">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        </div>
                        <div class="card-label">Autre usage</div>
                        <div class="autre-input">
                            <input type="text" id="autreText" placeholder="Précisez votre usage…" onclick="event.stopPropagation()">
                        </div>
                    </div>
                </div>

                <div class="btn-wrap">
                    <button type="submit" class="btn-continuer" id="btnContinuer">Continuer →</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function selectCard(card) {
            document.querySelectorAll('.usage-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            document.getElementById('typeUsageInput').value = card.dataset.value;
            document.getElementById('btnContinuer').classList.add('active');
        }

        document.getElementById('usageForm').addEventListener('submit', function() {
            if (document.getElementById('typeUsageInput').value === 'autre') {
                const txt = document.getElementById('autreText').value.trim();
                document.getElementById('autreUsageInput').value = txt || 'Autre';
            }
        });
    </script>
</body>
</html>
